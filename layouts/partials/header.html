<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ "/" | relURL }}" aria-label="{{ site.Params.lab_name }} home">
      <img src="{{ "/images/logo/YMatterLab-log-v1.svg" | relURL }}" alt="{{ site.Params.lab_name }}">
    </a>
    <nav>
      <ul class="nav-list">
        {{ range site.Menus.main }}
          <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
